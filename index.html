<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营部项目管理工具</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #F5F1E8;
            --bg-secondary: #FAF7F0;
            --bg-card: #FFFFFF;
            --primary: #D4C4A8;
            --primary-dark: #C9B896;
            --primary-light: #E8DFC8;
            --text-primary: #5C5C5C;
            --text-secondary: #8B8680;
            --border: #E8E0D0;
            --shadow: rgba(139, 134, 128, 0.08);
            
            --status-pending: #B8C5D0;
            --status-progress: #E6C9A8;
            --status-completed: #B8D4C8;
            --status-archived: #D4C4B0;
            
            --danger: #D4A5A5;
            --danger-dark: #C99494;
            --success: #A5C9A5;
            --info: #A8C5D9;
            --warning: #E6D7A8;
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 196, 168, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 196, 168, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(232, 223, 200, 0.3) 0%, transparent 70%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 196, 168, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            outline: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(212, 196, 168, 0.4);
        }

        .connection-status{font-size:13px;padding:8px 14px;border-radius:20px;background:var(--bg-secondary);border:1px solid var(--border);display:inline-flex;align-items:center;gap:6px;transition:all .3s;white-space:nowrap}.connection-status.connected{color:#5C5C5C}.connection-status.disconnected{color:var(--danger-dark);border-color:var(--danger)}.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}.status-dot.online{background:var(--success)}.status-dot.offline{background:var(--danger)}.status-dot.syncing{background:var(--primary);animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 196, 168, 0.5);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        .btn-info:hover {
            opacity: 0.9;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--text-primary);
        }

        .btn-warning:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: var(--radius-sm);
        }

        /* 筛选栏 */
        .filter-bar {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            box-shadow: 0 2px 12px var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-input, .filter-select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .filter-input:focus, .filter-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(212, 196, 168, 0.1);
        }

        /* 内容区域 */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 2px;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .archive-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .archive-grid {
                grid-template-columns: 1fr;
            }
        }

        .project-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: 0 2px 12px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--primary-light);
        }

        .project-card.archived {
            opacity: 0.85;
            background: var(--bg-secondary);
        }

        .project-card-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 28px;
        }

        @media (max-width: 900px) {
            .project-card-layout {
                grid-template-columns: 1fr;
            }
        }

        .project-main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .project-side {
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-left: 1px solid var(--border);
            padding-left: 28px;
        }

        @media (max-width: 900px) {
            .project-side {
                border-left: none;
                border-top: 1px solid var(--border);
                padding-left: 0;
                padding-top: 20px;
            }
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .project-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .project-status {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            outline: none;
        }

        .status-pending { background: var(--status-pending); color: #fff; }
        .status-progress { background: var(--status-progress); color: #fff; }
        .status-completed { background: var(--status-completed); color: #fff; }
        .status-archived { background: var(--status-archived); color: #fff; }

        .project-info {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border-left: 3px solid var(--primary-light);
        }

        .project-progress-section {
            background: var(--bg-secondary);
            padding: 16px 20px;
            border-radius: var(--radius-md);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar {
            height: 10px;
            background: var(--bg-primary);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 5px;
            transition: width 0.6s ease;
        }

        .milestones-section { margin-top: 8px; }

        .section-subtitle {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-subtitle::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }

        .milestones-grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 1200px) {
            .milestones-grid-5 { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .milestones-grid-5 { grid-template-columns: repeat(2, 1fr); }
        }

        .milestone-card-small {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            transition: all 0.3s;
        }

        .milestone-card-small:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow);
        }

        .milestone-card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .milestone-card-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .milestone-card-bar {
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .milestone-card-fill {
            height: 100%;
            border-radius: 2px;
        }

        .milestone-card-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: 500;
        }

        .milestone-status-pending { background: var(--status-pending); color: white; }
        .milestone-status-progress { background: var(--status-progress); color: white; }
        .milestone-status-completed { background: var(--status-completed); color: white; }
        .milestone-status-overdue { background: var(--danger); color: white; }

        .progress-preview-section { flex: 1; }

        .progress-preview-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-preview-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            position: relative;
            transition: all 0.3s;
            cursor: pointer;
        }

        .progress-preview-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateX(4px);
        }

        .progress-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-preview-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-preview-date {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .progress-preview-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .progress-preview-hint {
            font-size: 11px;
            color: var(--primary-dark);
            margin-top: 8px;
            text-align: right;
        }

        .no-progress-tip {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            font-style: italic;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .project-btns { display: flex; gap: 10px; }

        .sort-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .btn-sort {
            padding: 6px 10px;
            font-size: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .btn-sort:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-sort:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(92, 92, 92, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal { transform: scale(1); }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 18px;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label .required { color: var(--danger); margin-left: 2px; }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(212, 196, 168, 0.15);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg-secondary);
        }

        /* 富文本编辑器 */
        .rich-editor {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
        }

        .rich-editor-toolbar {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            background: var(--bg-primary);
            flex-wrap: wrap;
        }

        .rich-editor-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s;
        }

        .rich-editor-btn:hover {
            background: var(--primary);
            color: white;
        }

        .rich-editor-content {
            min-height: 200px;
            padding: 16px;
            outline: none;
            background: var(--bg-card);
        }

        .rich-editor-content img {
            max-width: 100%;
            cursor: se-resize;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .rich-editor-content img:hover {
            border-color: var(--primary);
        }

        .rich-editor-content img.resizing {
            border-color: var(--primary-dark);
            opacity: 0.8;
        }

        .progress-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            position: relative;
        }

        .progress-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-item-title {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .progress-item-actions {
            display: flex;
            gap: 6px;
        }

        .milestone-form {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            border: 1px dashed var(--border);
        }

        .milestone-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .milestone-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .archive-section {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-top: 40px;
            border: 2px dashed var(--border);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .detail-content { line-height: 1.8; }
        .detail-section { margin-bottom: 24px; }
        .detail-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);

    <script>

    // ====== GitHub Data Sync Layer ======
    var _GH_TOKEN = atob('Z2hwX2lrelpIVnBiZWR0ZHp3M0xpbVg1THR1QnNaclJyUVAxRXBMOEQ=');
    var _GH_OWNER = 'tiantiger';
    var _GH_REPO = 'ops-pm-tool';
    var _GH_BRANCH = 'main';
    var _GH_FILE = 'data.json';
    var _GH_API = 'https://api.github.com/repos/' + _GH_OWNER + '/' + _GH_REPO + '/contents/' + _GH_FILE;
    var _GH_HEADERS = { 'Authorization': 'token ' + _GH_TOKEN, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    var _ghSHA = null;
    var _ghPollTimer = null;
    var _ghWriting = false;

    function ghRead() {
        return fetch(_GH_API + '?ref=' + _GH_BRANCH, { headers: _GH_HEADERS }).then(function(r) {
            if (!r.ok) return null;
            return r.json();
        }).then(function(j) {
            if (!j) return [];
            _ghSHA = j.sha;
            try { var d = JSON.parse(decodeURIComponent(escape(atob(j.content)))); return Array.isArray(d) ? d : Object.values(d.projects || {}); }
            catch(e) { return []; }
        });
    }

    function ghWrite(projects) {
        if (_ghWriting) return Promise.resolve();
        _ghWriting = true;
        var content = btoa(unescape(encodeURIComponent(JSON.stringify(projects))));
        return ghRead().then(function() {
            var payload = { message: 'Update [' + new Date().toLocaleString('zh-CN') + ']', content: content, branch: _GH_BRANCH };
            if (_ghSHA) payload.sha = _ghSHA;
            return fetch(_GH_API, { method: 'PUT', headers: _GH_HEADERS, body: JSON.stringify(payload) });
        }).then(function(r) {
            if (!r.ok && r.status === 409) {
                return ghRead().then(function() {
                    payload.sha = _ghSHA;
                    return fetch(_GH_API, { method: 'PUT', headers: _GH_HEADERS, body: JSON.stringify(payload) });
                });
            }
            return r;
        }).then(function(r) {
            if (!r.ok) throw new Error('write failed');
            return r.json();
        }).then(function(res) { _ghSHA = res.content.sha; })
        .catch(function(e) { console.error('ghWrite error:', e); })
        .finally(function() { _ghWriting = false; });
    }

    function ghStartPoll() {
        if (_ghPollTimer) clearInterval(_ghPollTimer);
        _ghPollTimer = setInterval(function() {
            if (_ghWriting) return; // skip poll during write
            ghRead().then(function(data) {
                if (data && app && app.projects) {
                    // Only sync if remote has MORE projects than local (remote is newer)
                    if (data.length >= app.projects.length) {
                        var json1 = JSON.stringify(app.projects.sort(function(a,b){return a.createdAt-b.createdAt}));
                        var json2 = JSON.stringify(data.sort(function(a,b){return a.createdAt-b.createdAt}));
                        if (json1 !== json2) {
                            app.projects = data;
                            app.render();
                        }
                    }
                    updateConnectionStatus(true);
                }
            }).catch(function() {});
                }
            }).catch(function() {});
        }, 15000);
    }

    function updateConnectionStatus(connected) {
        var el = document.getElementById('connection-status');
        if (!el) return;
        if (connected) {
            el.innerHTML = '<span class="status-dot online"></span> 已同步';
            el.className = 'connection-status connected';
        } else {
            el.innerHTML = '<span class="status-dot offline"></span> 未连接';
            el.className = 'connection-status disconnected';
        }
    }


        class ProjectManager {
            constructor() {
                this.projects = [];
                this.currentMilestones = [];
                this.editingId = null;
                this.deleteId = null;
                this.archiveId = null;
                this.editingProgressId = null;
                this.deleteProgressId = null;
                this.currentProgressProjectId = null;
                this.selectedRestoreTime = null;
                
                // 备份配置
                this.backupKeys = {
                    '5min': 'pm_backup_5min',
                    '1hour': 'pm_backup_1hour',
                    '6hour': 'pm_backup_6hour'
                };
                this.backupIntervals = {
                    '5min': 5 * 60 * 1000,      // 5分钟
                    '1hour': 60 * 60 * 1000,    // 1小时
                    '6hour': 6 * 60 * 60 * 1000 // 6小时
                };
                
                this.init();
            }

            init() {
                this.loadData();
                this.render();
                this.initImageResize();
                this.startAutoBackup();
                
                // 绑定日期校验
                document.getElementById('project-start')?.addEventListener('change', () => this.validateDates());
                document.getElementById('project-end')?.addEventListener('change', () => this.validateDates());
            }

            // 自动备份系统
            startAutoBackup() {
                // 立即创建一次备份（如果还没有）
                this.createBackupIfNeeded();
                
                // 每分钟检查一次是否需要备份
                setInterval(() => {
                    this.createBackupIfNeeded();
                }, 60000); // 每分钟检查
                
                console.log('自动备份系统已启动');
            }

            createBackupIfNeeded() {
                const now = Date.now();
                
                Object.keys(this.backupKeys).forEach(key => {
                    const backupKey = this.backupKeys[key];
                    const interval = this.backupIntervals[key];
                    const lastBackup = localStorage.getItem(backupKey + '_time');
                    
                    // 如果没有备份记录，或已经超过间隔时间，则创建新备份
                    if (!lastBackup || (now - parseInt(lastBackup)) > interval) {
                        this.createBackup(key);
                    }
                });
            }

            createBackup(type) {
                try {
                    const backupKey = this.backupKeys[type];
                    const data = {
                        projects: this.projects,
                        timestamp: Date.now(),
                        timeLabel: new Date().toLocaleString('zh-CN')
                    };
                    
                    localStorage.setItem(backupKey, JSON.stringify(data));
                    localStorage.setItem(backupKey + '_time', Date.now().toString());
                    
                    console.log(`[${type}] 备份已创建:`, data.timeLabel);
                } catch (e) {
                    console.error('备份失败:', e);
                }
            }

            // 检查备份状态
            checkBackupStatus() {
                const now = Date.now();
                const status = {};
                
                Object.keys(this.backupKeys).forEach(key => {
                    const backupKey = this.backupKeys[key];
                    const lastBackup = localStorage.getItem(backupKey + '_time');
                    const backupData = localStorage.getItem(backupKey);
                    
                    if (lastBackup && backupData) {
                        const age = now - parseInt(lastBackup);
                        const minutesAgo = Math.floor(age / 60000);
                        
                        let timeText;
                        if (minutesAgo < 1) timeText = '刚刚';
                        else if (minutesAgo < 60) timeText = `${minutesAgo}分钟前`;
                        else {
                            const hoursAgo = Math.floor(minutesAgo / 60);
                            timeText = `${hoursAgo}小时前`;
                        }
                        
                        status[key] = {
                            available: true,
                            timeText: timeText,
                            age: age,
                            data: JSON.parse(backupData)
                        };
                    } else {
                        status[key] = {
                            available: false,
                            timeText: '无备份',
                            age: Infinity,
                            data: null
                        };
                    }
                });
                
                return status;
            }

            openRestoreModal() {
                const status = this.checkBackupStatus();
                
                // 更新UI显示
                const updateStatus = (key, elementId) => {
                    const el = document.getElementById(elementId);
                    const radio = document.getElementById(`restore-${key}`);
                    const s = status[key];
                    
                    if (s.available) {
                        el.textContent = `可用 (${s.timeText})`;
                        el.className = 'restore-option-status available';
                        radio.disabled = false;
                        
                        // 如果是第一个可用的，默认选中
                        if (key === '5min' && s.available) {
                            radio.checked = true;
                            this.selectedRestoreTime = key;
                        } else if (key === '1hour' && !status['5min'].available && s.available) {
                            radio.checked = true;
                            this.selectedRestoreTime = key;
                        }
                    } else {
                        el.textContent = '无可用备份';
                        el.className = 'restore-option-status unavailable';
                        radio.disabled = true;
                    }
                };
                
                updateStatus('5min', 'status-5min');
                updateStatus('1hour', 'status-1hour');
                updateStatus('6hour', 'status-6hour');
                
                // 绑定选择事件
                document.querySelectorAll('input[name="restore-time"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            this.selectedRestoreTime = e.target.value;
                        }
                    });
                });
                
                document.getElementById('restore-modal').classList.add('active');
            }

            confirmRestore() {
                if (!this.selectedRestoreTime) {
                    this.showToast('请选择要恢复的时间点');
                    return;
                }
                
                const status = this.checkBackupStatus();
                const selectedStatus = status[this.selectedRestoreTime];
                
                if (!selectedStatus.available) {
                    this.showToast('该时间点暂无可用备份');
                    return;
                }
                
                // 显示确认弹窗
                const timeText = {
                    '5min': '5分钟前',
                    '1hour': '1小时前',
                    '6hour': '6小时前'
                }[this.selectedRestoreTime];
                
                document.getElementById('confirm-restore-text').innerHTML = 
                    `确定要恢复到 <strong>${timeText}</strong> 的版本吗？<br><br>` +
                    `备份时间：${selectedStatus.data.timeLabel}<br>` +
                    `项目数量：${selectedStatus.data.projects.length}个<br><br>` +
                    `<span style="color: var(--danger);">警告：当前所有数据将被覆盖，此操作不可撤销！</span>`;
                
                document.getElementById('confirm-restore-modal').classList.add('active');
            }

            executeRestore() {
                const status = this.checkBackupStatus();
                const backup = status[this.selectedRestoreTime];
                
                if (backup && backup.data && backup.data.projects) {
                    this.projects = backup.data.projects;
                    this.saveData();
                    this.render();
                    this.showToast(`已成功恢复到${this.selectedRestoreTime === '5min' ? '5分钟前' : this.selectedRestoreTime === '1hour' ? '1小时前' : '6小时前'}的版本`);
                    
                    // 关闭所有相关弹窗
                    this.closeModal('confirm-restore-modal');
                    this.closeModal('restore-modal');
                    
                    // 重置选择
                    this.selectedRestoreTime = null;
                    document.querySelectorAll('input[name="restore-time"]').forEach(r => r.checked = false);
                } else {
                    this.showToast('恢复失败：备份数据损坏');
                }
            }

            // 富文本图片resize
            initImageResize() {
                const editor = document.getElementById('progress-content');
                if (!editor) return;
                
                let isResizing = false;
                let currentImage = null;
                let startX, startY, startWidth;

                editor.addEventListener('click', (e) => {
                    if (e.target.tagName === 'IMG') {
                        currentImage = e.target;
                        editor.querySelectorAll('img').forEach(img => img.classList.remove('resizing'));
                        currentImage.classList.add('resizing');
                        e.stopPropagation();
                    } else {
                        editor.querySelectorAll('img').forEach(img => img.classList.remove('resizing'));
                        currentImage = null;
                    }
                });

                editor.addEventListener('mousedown', (e) => {
                    if (e.target.tagName === 'IMG') {
                        const rect = e.target.getBoundingClientRect();
                        const edge = 10;
                        if (e.clientX > rect.right - edge && e.clientY > rect.bottom - edge) {
                            isResizing = true;
                            currentImage = e.target;
                            startX = e.clientX;
                            startWidth = parseInt(document.defaultView.getComputedStyle(currentImage).width, 10);
                            e.preventDefault();
                            e.stopPropagation();
                        }
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing || !currentImage) return;
                    const width = startWidth + (e.clientX - startX);
                    if (width > 50) {
                        currentImage.style.width = width + 'px';
                        currentImage.style.height = 'auto';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizing = false;
                });
            }

            loadData() {
                var self = this;
                updateConnectionStatus(false);
                ghRead().then(function(data) {
                    if (data && data.length > 0) {
                        self.projects = data;
                        updateConnectionStatus(true);
                        ghStartPoll();
                    } else {
                        var local = localStorage.getItem('pm_projects');
                        if (local) {
                            try { self.projects = JSON.parse(local); } catch(e) {}
                        }
                        if (self.projects.length > 0) {
                            ghWrite(self.projects).then(function() {
                                updateConnectionStatus(true);
                                ghStartPoll();
                            });
                        } else {
                            updateConnectionStatus(true);
                            ghStartPoll();
                        }
                    }
                    self.render();
                }).catch(function(err) {
                    console.error('GitHub sync failed, falling back to localStorage:', err);
                    var local = localStorage.getItem('pm_projects');
                    if (local) {
                        try { self.projects = JSON.parse(local); } catch(e) {}
                    }
                    updateConnectionStatus(false);
                    self.render();
                });
            }

            saveData() {
                try { localStorage.setItem('pm_projects', JSON.stringify(this.projects)); } catch(e) {}
                ghWrite(this.projects).then(function() {
                    updateConnectionStatus(true);
                }).catch(function() {
                    updateConnectionStatus(false);
                });
            }

                        document.getElementById('project-start').value = project.startDate;

            validateDates() {
                const start = document.getElementById('project-start').value;
                const end = document.getElementById('project-end').value;
                if (start && end && start > end) {
                    this.showToast('开始时间必须早于结束时间');
                    document.getElementById('project-end').value = '';
                }
            }

            saveProject() {
                const name = document.getElementById('project-name').value.trim();
                const owner = document.getElementById('project-owner').value.trim();
                const startDate = document.getElementById('project-start').value;
                const endDate = document.getElementById('project-end').value;
                const status = document.getElementById('project-status').value;
                const projectProgress = parseInt(document.getElementById('project-progress').value) || 0;
                const members = document.getElementById('project-members').value.trim();
                const description = document.getElementById('project-desc').value.trim();
                
                if (!name) { this.showToast('请输入项目名称'); return; }
                if (!startDate || !endDate) { this.showToast('请选择起止时间'); return; }
                if (startDate > endDate) { this.showToast('开始时间必须早于结束时间'); return; }
                
                const existing = this.projects.find(p => p.name === name && p.id !== this.editingId);
                if (existing) { this.showToast('项目名称已存在'); return; }
                
                const projectData = {
                    id: this.editingId || Date.now().toString(),
                    name, owner, startDate, endDate, status, projectProgress, members, description,
                    milestones: this.currentMilestones,
                    progressRecords: this.editingId ? (this.projects.find(p => p.id === this.editingId)?.progressRecords || []) : [],
                    archived: false,
                    createdAt: this.editingId ? (this.projects.find(p => p.id === this.editingId)?.createdAt || Date.now()) : Date.now()
                };
                
                if (this.editingId) {
                    const index = this.projects.findIndex(p => p.id === this.editingId);
                    if (index !== -1) {
                        if (this.projects[index].archived) projectData.archived = true;
                        this.projects[index] = projectData;
                    }
                } else {
                    this.projects.push(projectData);
                }
                
                this.saveData();
                this.render();
                this.closeModal('project-modal');
                this.showToast(this.editingId ? '项目更新成功' : '项目创建成功');
            }

            deleteProject(id) {
                const project = this.projects.find(p => p.id === id);
                if (!project) return;
                
                this.deleteId = id;
                document.getElementById('confirm-title').textContent = '删除项目';
                document.getElementById('confirm-text').textContent = `确定删除"${project.name}"吗？`;
                document.getElementById('confirm-btn').onclick = () => {
                    this.projects = this.projects.filter(p => p.id !== this.deleteId);
                    this.saveData();
                    this.render();
                    this.showToast('项目已删除');
                    this.closeModal('confirm-modal');
                };
                document.getElementById('confirm-modal').classList.add('active');
            }

            archiveProject(id) {
                const index = this.projects.findIndex(p => p.id === id);
                if (index !== -1) {
                    this.projects[index].archived = true;
                    this.saveData();
                    this.render();
                    this.showToast('项目已归档');
                }
            }

            unarchiveProject(id) {
                const index = this.projects.findIndex(p => p.id === id);
                if (index !== -1) {
                    this.projects[index].archived = false;
                    this.saveData();
                    this.render();
                    this.showToast('项目已恢复');
                }
            }

            moveProject(id, direction) {
                const activeProjects = this.projects.filter(p => !p.archived);
                const currentIndex = activeProjects.findIndex(p => p.id === id);
                
                if (direction === 'up' && currentIndex > 0) {
                    const currentIdx = this.projects.findIndex(p => p.id === id);
                    const prevIdx = this.projects.findIndex(p => p.id === activeProjects[currentIndex - 1].id);
                    [this.projects[currentIdx], this.projects[prevIdx]] = [this.projects[prevIdx], this.projects[currentIdx]];
                } else if (direction === 'down' && currentIndex < activeProjects.length - 1) {
                    const currentIdx = this.projects.findIndex(p => p.id === id);
                    const nextIdx = this.projects.findIndex(p => p.id === activeProjects[currentIndex + 1].id);
                    [this.projects[currentIdx], this.projects[nextIdx]] = [this.projects[nextIdx], this.projects[currentIdx]];
                }
                
                this.saveData();
                this.render();
            }

            changeStatus(id, newStatus) {
                const index = this.projects.findIndex(p => p.id === id);
                if (index !== -1) {
                    this.projects[index].status = newStatus;
                    this.saveData();
                    this.render();
                    this.showToast(`状态已更新：${newStatus}`);
                }
            }

            addMilestone() {
                const name = document.getElementById('milestone-name').value.trim();
                const start = document.getElementById('milestone-start').value;
                const end = document.getElementById('milestone-end').value;
                const status = document.getElementById('milestone-status').value;
                const progress = parseInt(document.getElementById('milestone-progress').value) || 0;
                
                if (!name || !start || !end) { this.showToast('请填写完整里程碑信息'); return; }
                if (start > end) { this.showToast('开始时间必须早于结束时间'); return; }
                if (this.currentMilestones.some(m => m.name === name)) { this.showToast('里程碑名称不能重复'); return; }
                
                this.currentMilestones.push({
                    id: Date.now().toString(),
                    name, startDate: start, endDate: end, status, progress,
                    isOverdue: new Date(end) < new Date() && status !== '已完成'
                });
                
                document.getElementById('milestone-name').value = '';
                document.getElementById('milestone-start').value = '';
                document.getElementById('milestone-end').value = '';
                document.getElementById('milestone-progress').value = '';
                this.renderMilestones();
            }

            removeMilestone(id) {
                this.currentMilestones = this.currentMilestones.filter(m => m.id !== id);
                this.renderMilestones();
            }

            renderMilestones() {
                const container = document.getElementById('milestone-list');
                if (this.currentMilestones.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无里程碑</div>';
                    return;
                }
                container.innerHTML = this.currentMilestones.map(m => `
                    <div class="milestone-item">
                        <div class="milestone-item-info">
                            <div class="milestone-item-name">${m.name}</div>
                            <div class="milestone-item-meta">${m.startDate} 至 ${m.endDate} | ${m.progress}%</div>
                        </div>
                        <button type="button" class="btn btn-danger btn-sm" onclick="app.removeMilestone('${m.id}')">删除</button>
                    </div>
                `).join('');
            }

            openProgressModal(projectId) {
                this.currentProgressProjectId = projectId;
                document.getElementById('progress-project-id').value = projectId;
                this.loadProgressHistory(projectId);
                document.getElementById('progress-modal').classList.add('active');
            }

            loadProgressHistory(projectId) {
                const project = this.projects.find(p => p.id === projectId);
                const container = document.getElementById('progress-history');
                
                if (!project || !project.progressRecords || project.progressRecords.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无进展记录</div>';
                    return;
                }
                
                const sorted = [...project.progressRecords].sort((a, b) => b.createdAt - a.createdAt);
                
                container.innerHTML = sorted.map(p => `
                    <div class="progress-item">
                        <div class="progress-item-header">
                            <span class="progress-item-title">${p.title}</span>
                            <div class="progress-item-actions">
                                <button class="btn btn-secondary btn-sm" onclick="app.editProgress('${p.id}')">编辑</button>
                                <button class="btn btn-danger btn-sm" onclick="app.deleteProgress('${p.id}')">删除</button>
                            </div>
                        </div>
                        <div class="progress-item-content">${p.content.substring(0, 100)}...</div>
                    </div>
                `).join('');

            editProgress(progressId) {
                const project = this.projects.find(p => p.id === this.currentProgressProjectId);
                if (!project) return;
                
                const record = project.progressRecords.find(r => r.id === progressId);
                if (!record) return;
                
                this.editingProgressId = progressId;
                document.getElementById('editing-progress-id').value = progressId;
                document.getElementById('progress-title').value = record.title;
                document.getElementById('progress-content').innerHTML = record.content;
            }

            deleteProgress(progressId) {
                this.deleteProgressId = progressId;
                document.getElementById('confirm-title').textContent = '删除进展';
                document.getElementById('confirm-text').textContent = '确定删除这条进展记录吗？';
                document.getElementById('confirm-btn').onclick = () => {
                    const project = this.projects.find(p => p.id === this.currentProgressProjectId);
                    if (project) {
                        project.progressRecords = project.progressRecords.filter(r => r.id !== this.deleteProgressId);
                        this.saveData();
                        this.loadProgressHistory(this.currentProgressProjectId);
                        this.render();
                        this.showToast('进展已删除');
                    }
                    this.closeModal('confirm-modal');
                };
                document.getElementById('confirm-modal').classList.add('active');
            }

            saveProgress() {
                const projectId = this.currentProgressProjectId;
                const title = document.getElementById('progress-title').value.trim();
                const content = document.getElementById('progress-content').innerHTML;
                const editingId = document.getElementById('editing-progress-id').value;
                
                if (!title || !content) { this.showToast('请填写完整信息'); return; }
                
                const project = this.projects.find(p => p.id === projectId);
                if (!project) return;
                
                if (!project.progressRecords) project.progressRecords = [];
                
                if (editingId) {
                    const record = project.progressRecords.find(r => r.id === editingId);
                    if (record) {
                        record.title = title;
                        record.content = content;
                        record.updatedAt = Date.now();
                        this.showToast('进展已更新');
                    }
                    this.editingProgressId = null;
                    document.getElementById('editing-progress-id').value = '';
                } else {
                    project.progressRecords.push({
                        id: Date.now().toString(),
                        title, content,
                        createdAt: Date.now()
                    });
                    this.showToast('进展已保存');
                }
                
                this.saveData();
                this.loadProgressHistory(projectId);
                document.getElementById('progress-title').value = '';
                document.getElementById('progress-content').innerHTML = '';
                this.render();
            }

                document.getElementById('filter-name').value = '';
                document.getElementById('filter-owner').value = '';
                document.getElementById('filter-status').value = '';
                this.render();
            }

            getFilteredProjects() {
                const nameFilter = document.getElementById('filter-name').value.toLowerCase();
                const ownerFilter = document.getElementById('filter-owner').value.toLowerCase();
                const statusFilter = document.getElementById('filter-status').value;
                
                return this.projects.filter(p => {
                    if (p.archived) return false;
                    const matchName = p.name.toLowerCase().includes(nameFilter);
                    const matchOwner = !ownerFilter || (p.owner && p.owner.toLowerCase().includes(ownerFilter));
                    const matchStatus = !statusFilter || p.status === statusFilter;
                    return matchName && matchOwner && matchStatus;
                });
            }

                                <div class="progress-preview-content">${p.content.replace(/<[^>]*>/g, '').substring(0, 60)}...</div>
                                <div class="progress-preview-hint">点击查看完整内容</div>
                            </div>
                        `).join('')}
                        ${sorted.length > 2 ? `<div style="text-align: center; font-size: 12px; color: #999;">还有 ${sorted.length - 2} 条...</div>` : ''}

                            const statusClass = isOverdue ? 'milestone-status-overdue' : 
                                               m.status === '已完成' ? 'milestone-status-completed' : 
                                               m.status === '进行中' ? 'milestone-status-progress' : 'milestone-status-pending';
                            
                            return `
                                <div class="milestone-card-small">
                                    <div class="milestone-card-name">${m.name}</div>
                                    <div class="milestone-card-date">${m.startDate.slice(5)} 至 ${m.endDate.slice(5)}</div>
                                    <div class="milestone-card-bar">
                                        <div class="milestone-card-fill" style="width: ${m.progress}%; background: ${m.status === '已完成' ? '#B8D4C8' : '#E6C9A8'}"></div>
                                    </div>
                                    <span class="milestone-card-status ${statusClass}">${isOverdue ? '逾期' : m.status}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Excel导出（修复版）
            exportExcel() {
                try {
                    if (this.projects.length === 0) {
                        this.showToast('暂无数据可导出');
                        return;
                    }

                    const wb = XLSX.utils.book_new();

                    // 项目列表
                    const projectData = this.projects.map(p => ({
                        '项目ID': p.id,
                        '项目名称': p.name,
                        '负责人': p.owner || '',
                        '开始时间': p.startDate,
                        '结束时间': p.endDate,
                        '项目状态': p.status,
                        '项目进度': p.projectProgress || 0,
                        '团队成员': p.members || '',
                        '项目描述': p.description || '',
                        '是否归档': p.archived ? '是' : '否',
                        '创建时间': new Date(p.createdAt).toLocaleString('zh-CN')
                    }));
                    
                    const ws1 = XLSX.utils.json_to_sheet(projectData);
                    ws1['!cols'] = [{wch: 15}, {wch: 20}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 10}, {wch: 10}, {wch: 20}, {wch: 30}, {wch: 8}, {wch: 20}];
                    XLSX.utils.book_append_sheet(wb, ws1, '项目列表');

                    // 里程碑
                    let milestoneData = [];
                    this.projects.forEach(p => {
                        p.milestones?.forEach(m => {
                            milestoneData.push({
                                '所属项目ID': p.id,
                                '里程碑名称': m.name,
                                '开始时间': m.startDate,
                                '结束时间': m.endDate,
                                '状态': m.status,
                                '进度': m.progress
                            });
                        });
                    });
                    
                    if (milestoneData.length > 0) {
                        const ws2 = XLSX.utils.json_to_sheet(milestoneData);
                        ws2['!cols'] = [{wch: 15}, {wch: 20}, {wch: 12}, {wch: 12}, {wch: 10}, {wch: 8}];
                        XLSX.utils.book_append_sheet(wb, ws2, '里程碑明细');
                    }

                    // 进展记录
                    let progressData = [];
                    this.projects.forEach(p => {
                        p.progressRecords?.forEach(r => {
                            progressData.push({
                                '所属项目ID': p.id,
                                '记录ID': r.id,
                                '标题': r.title,
                                '内容(HTML)': r.content,
                                '创建时间': new Date(r.createdAt).toLocaleString('zh-CN')
                            });
                        });
                    });
                    
                    if (progressData.length > 0) {
                        const ws3 = XLSX.utils.json_to_sheet(progressData);
                        ws3['!cols'] = [{wch: 15}, {wch: 15}, {wch: 25}, {wch: 60}, {wch: 20}];
                        XLSX.utils.book_append_sheet(wb, ws3, '进展记录明细');
                    }

                    XLSX.writeFile(wb, `运营部项目数据_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
                    this.showToast('Excel导出成功');
                } catch (err) {
                    console.error('导出失败:', err);
                    this.showToast('导出失败：' + err.message);
                }
            }

            // Excel导入（修复版）
            importExcel(input) {
                const file = input.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        
                        // 读取项目列表
                        const projectSheet = workbook.Sheets['项目列表'];
                        if (!projectSheet) {
                            this.showToast('未找到"项目列表"工作表');
                            return;
                        }
                        
                        const projectsJson = XLSX.utils.sheet_to_json(projectSheet);
                        if (projectsJson.length === 0) {
                            this.showToast('Excel文件为空');
                            return;
                        }

                        if (confirm(`检测到 ${projectsJson.length} 个项目，是否导入？这将覆盖当前数据。`)) {
                            this.projects = projectsJson.map(p => ({
                                id: p['项目ID'] || Date.now().toString(),
                                name: p['项目名称'],
                                owner: p['负责人'] || '',
                                startDate: p['开始时间'],
                                endDate: p['结束时间'],
                                status: p['项目状态'] || '未启动',
                                projectProgress: p['项目进度'] || 0,
                                members: p['团队成员'] || '',
                                description: p['项目描述'] || '',
                                milestones: [],
                                progressRecords: [],
                                archived: p['是否归档'] === '是',
                                createdAt: Date.now()
                            }));
                            
                            // 读取里程碑
                            const msSheet = workbook.Sheets['里程碑明细'];
                            if (msSheet) {
                                const msJson = XLSX.utils.sheet_to_json(msSheet);
                                msJson.forEach(m => {
                                    const project = this.projects.find(p => p.id === m['所属项目ID']);
                                    if (project) {
                                        project.milestones.push({
                                            id: Date.now().toString(),
                                            name: m['里程碑名称'],
                                            startDate: m['开始时间'],
                                            endDate: m['结束时间'],
                                            status: m['状态'],
                                            progress: m['进度'] || 0
                                        });
                                    }
                                });
                            }
                            
                            // 读取进展
                            const prSheet = workbook.Sheets['进展记录明细'];
                            if (prSheet) {
                                const prJson = XLSX.utils.sheet_to_json(prSheet);
                                prJson.forEach(r => {
                                    const project = this.projects.find(p => p.id === r['所属项目ID']);
                                    if (project) {
                                        project.progressRecords.push({
                                            id: r['记录ID'] || Date.now().toString(),
                                            title: r['标题'],
                                            content: r['内容(HTML)'] || r['内容'] || '',
                                            createdAt: new Date(r['创建时间']).getTime() || Date.now()
                                        });
                                    }
                                });
                            }
                            
                            this.saveData();
                            this.render();
                            this.showToast(`成功导入 ${this.projects.length} 个项目`);
                        }
                    } catch (err) {
                        console.error('导入失败:', err);
                        this.showToast('导入失败：' + err.message);
                    }
                    input.value = '';
                };
                reader.readAsArrayBuffer(file);
            }

            render() {
                const activeContainer = document.getElementById('active-projects');
                const archivedContainer = document.getElementById('archived-projects');
                const filtered = this.getFilteredProjects();
                const archived = this.projects.filter(p => p.archived);
                
                document.getElementById('empty-active').style.display = filtered.length === 0 ? 'block' : 'none';
                document.getElementById('empty-archived').style.display = archived.length === 0 ? 'block' : 'none';
                
                activeContainer.innerHTML = filtered.map((p, index) => this.renderProjectCard(p, index, filtered.length)).join('');
                archivedContainer.innerHTML = archived.map(p => this.renderArchivedCard(p)).join('');
            }

            renderProjectCard(project, index, total) {
                const statusClass = { '未启动': 'status-pending', '进行中': 'status-progress', '已完成': 'status-completed' }[project.status];
                
                return `
                    <div class="project-card" data-id="${project.id}">
                        <div class="project-card-layout">
                            <div class="project-main">
                                <div class="project-header">
                                    <div>
                                        <div class="project-title">${project.name}</div>
                                        <div class="project-meta">
                                            <span>📅 ${project.startDate} 至 ${project.endDate}</span>
                                            ${project.owner ? `<span>👤 ${project.owner}</span>` : ''}
                                        </div>
                                    </div>
                                    <select class="project-status ${statusClass}" onchange="app.changeStatus('${project.id}', this.value)">
                                        <option value="未启动" ${project.status === '未启动' ? 'selected' : ''}>未启动</option>
                                        <option value="进行中" ${project.status === '进行中' ? 'selected' : ''}>进行中</option>
                                        <option value="已完成" ${project.status === '已完成' ? 'selected' : ''}>已完成</option>
                                    </select>
                                </div>
                                
                                ${project.description ? `<div class="project-description">${project.description}</div>` : ''}
                                
                                <div class="project-progress-section">
                                    <div class="progress-header">
                                        <span>📊 项目进度</span>
                                        <span>${project.projectProgress || 0}%</span>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${project.projectProgress || 0}%"></div>
                                    </div>
                                </div>
                                
                                <div class="milestones-section">
                                    <div class="section-subtitle">里程碑 (${project.milestones?.length || 0}个)</div>
                                    ${this.renderMilestonesGrid(project.milestones)}
                                </div>
                                
                                <div class="project-footer">
                                    <div class="project-btns">
                                        <button class="btn btn-secondary btn-sm" onclick="app.openProgressModal('${project.id}')">📝 记录进展</button>
                                        <button class="btn btn-secondary btn-sm" onclick="app.viewDetails('${project.id}')">👁️ 查看详情</button>
                                        <button class="btn btn-secondary btn-sm" onclick="app.openProjectModal('${project.id}')">✏️ 编辑</button>
                                        <button class="btn btn-danger btn-sm" onclick="app.deleteProject('${project.id}')">🗑️ 删除</button>
                                    </div>
                                    <div class="sort-btns">
                                        <button class="btn-sort" onclick="app.moveProject('${project.id}', 'up')" ${index === 0 ? 'disabled' : ''}>↑</button>
                                        <button class="btn-sort" onclick="app.moveProject('${project.id}', 'down')" ${index === total - 1 ? 'disabled' : ''}>↓</button>
                                        <button class="btn btn-secondary btn-sm" onclick="app.archiveProject('${project.id}')" style="margin-left: 8px;">📦 归档</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="project-side">
                                <div class="progress-preview-section">
                                    <div class="section-subtitle">最新进展</div>
                                    ${this.renderProgressPreview(project)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderArchivedCard(project) {
                return `
                    <div class="project-card archived" style="padding: 20px;">
                        <div class="project-header" style="margin-bottom: 12px;">
                            <div>
                                <div class="project-title" style="font-size: 16px;">${project.name}</div>
                                <div class="project-meta">${project.startDate} 至 ${project.endDate}</div>
                            </div>
                            <span class="project-status status-archived">已归档</span>
                        </div>
                        <div style="font-size: 12px; color: #8B8680; margin-bottom: 12px;">
                            进度: ${project.projectProgress || 0}% | 里程碑: ${project.milestones?.length || 0}个 | 进展: ${project.progressRecords?.length || 0}条
                        </div>
                        <div class="project-footer" style="padding-top: 12px;">
                            <button class="btn btn-secondary btn-sm" onclick="app.viewDetails('${project.id}')">👁️ 查看</button>
                            <button class="btn btn-success btn-sm" onclick="app.unarchiveProject('${project.id}')">↩️ 恢复</button>
                        </div>
                    </div>
                `;
            }

            exportPNG() {
                const element = document.getElementById('capture-area');
                html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#F5F1E8',
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `运营部项目看板_${new Date().toLocaleDateString('zh-CN')}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                    this.showToast('PNG导出成功');
                }).catch(err => {
                    this.showToast('导出失败');
                });
            }

            showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        const app = new ProjectManager();
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            }
        });
    
        </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营部项目管理工具</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.20.1/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #F5F1E8;
            --bg-secondary: #FAF7F0;
            --bg-card: #FFFFFF;
            --primary: #D4C4A8;
            --primary-dark: #C9B896;
            --primary-light: #E8DFC8;
            --text-primary: #5C5C5C;
            --text-secondary: #8B8680;
            --border: #E8E0D0;
            --shadow: rgba(139, 134, 128, 0.08);
            
            --status-pending: #B8C5D0;
            --status-progress: #E6C9A8;
            --status-completed: #B8D4C8;
            --status-archived: #D4C4B0;
            
            --danger: #D4A5A5;
            --danger-dark: #C99494;
            --success: #A5C9A5;
            --info: #A8C5D9;
            --warning: #E6D7A8;
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 196, 168, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 196, 168, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(232, 223, 200, 0.3) 0%, transparent 70%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 196, 168, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            outline: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(212, 196, 168, 0.4);
        }

        .connection-status{font-size:13px;padding:8px 14px;border-radius:20px;background:var(--bg-secondary);border:1px solid var(--border);display:inline-flex;align-items:center;gap:6px;transition:all .3s;white-space:nowrap}.connection-status.connected{color:#5C5C5C}.connection-status.disconnected{color:var(--danger-dark);border-color:var(--danger)}.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}.status-dot.online{background:var(--success)}.status-dot.offline{background:var(--danger)}.status-dot.syncing{background:var(--primary);animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 196, 168, 0.5);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        .btn-info:hover {
            opacity: 0.9;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--text-primary);
        }

        .btn-warning:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: var(--radius-sm);
        }

        /* 筛选栏 */
        .filter-bar {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            box-shadow: 0 2px 12px var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-input, .filter-select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .filter-input:focus, .filter-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(212, 196, 168, 0.1);
        }

        /* 内容区域 */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 2px;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .archive-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .archive-grid {
                grid-template-columns: 1fr;
            }
        }

        .project-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: 0 2px 12px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--primary-light);
        }

        .project-card.archived {
            opacity: 0.85;
            background: var(--bg-secondary);
        }

        .project-card-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 28px;
        }

        @media (max-width: 900px) {
            .project-card-layout {
                grid-template-columns: 1fr;
            }
        }

        .project-main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .project-side {
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-left: 1px solid var(--border);
            padding-left: 28px;
        }

        @media (max-width: 900px) {
            .project-side {
                border-left: none;
                border-top: 1px solid var(--border);
                padding-left: 0;
                padding-top: 20px;
            }
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .project-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .project-status {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            outline: none;
        }

        .status-pending { background: var(--status-pending); color: #fff; }
        .status-progress { background: var(--status-progress); color: #fff; }
        .status-completed { background: var(--status-completed); color: #fff; }
        .status-archived { background: var(--status-archived); color: #fff; }

        .project-info {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border-left: 3px solid var(--primary-light);
        }

        .project-progress-section {
            background: var(--bg-secondary);
            padding: 16px 20px;
            border-radius: var(--radius-md);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar {
            height: 10px;
            background: var(--bg-primary);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 5px;
            transition: width 0.6s ease;
        }

        .milestones-section { margin-top: 8px; }

        .section-subtitle {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-subtitle::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }

        .milestones-grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 1200px) {
            .milestones-grid-5 { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .milestones-grid-5 { grid-template-columns: repeat(2, 1fr); }
        }

        .milestone-card-small {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            transition: all 0.3s;
        }

        .milestone-card-small:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow);
        }

        .milestone-card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .milestone-card-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .milestone-card-bar {
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .milestone-card-fill {
            height: 100%;
            border-radius: 2px;
        }

        .milestone-card-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: 500;
        }

        .milestone-status-pending { background: var(--status-pending); color: white; }
        .milestone-status-progress { background: var(--status-progress); color: white; }
        .milestone-status-completed { background: var(--status-completed); color: white; }
        .milestone-status-overdue { background: var(--danger); color: white; }

        .progress-preview-section { flex: 1; }

        .progress-preview-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-preview-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            position: relative;
            transition: all 0.3s;
            cursor: pointer;
        }

        .progress-preview-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateX(4px);
        }

        .progress-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-preview-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-preview-date {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .progress-preview-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .progress-preview-hint {
            font-size: 11px;
            color: var(--primary-dark);
            margin-top: 8px;
            text-align: right;
        }

        .no-progress-tip {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            font-style: italic;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .project-btns { display: flex; gap: 10px; }

        .sort-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .btn-sort {
            padding: 6px 10px;
            font-size: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .btn-sort:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-sort:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(92, 92, 92, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal { transform: scale(1); }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 18px;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label .required { color: var(--danger); margin-left: 2px; }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(212, 196, 168, 0.15);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg-secondary);
        }

        /* 富文本编辑器 */
        .rich-editor {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
        }

        .rich-editor-toolbar {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            background: var(--bg-primary);
            flex-wrap: wrap;
        }

        .rich-editor-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s;
        }

        .rich-editor-btn:hover {
            background: var(--primary);
            color: white;
        }

        .rich-editor-content {
            min-height: 200px;
            padding: 16px;
            outline: none;
            background: var(--bg-card);
        }

        .rich-editor-content img {
            max-width: 100%;
            cursor: se-resize;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .rich-editor-content img:hover {
            border-color: var(--primary);
        }

        .rich-editor-content img.resizing {
            border-color: var(--primary-dark);
            opacity: 0.8;
        }

        .progress-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            position: relative;
        }

        .progress-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-item-title {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .progress-item-actions {
            display: flex;
            gap: 6px;
        }

        .milestone-form {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            border: 1px dashed var(--border);
        }

        .milestone-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .milestone-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .archive-section {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-top: 40px;
            border: 2px dashed var(--border);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .detail-content { line-height: 1.8; }
        .detail-section { margin-bottom: 24px; }
        .detail-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);

    <script>
function GithubDB(cfg) {
    this.config = cfg;
    this.baseUrl = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + cfg.file;
    this.headers = { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    this.data = { projects: {} };
    this.sha = null;
    this.pollTimer = null;
    this.onUpdate = null;
    this._lock = false;
}
GithubDB.prototype.read = function() {
    var self = this;
    return fetch(self.baseUrl + '?ref=' + self.config.branch, { headers: self.headers }).then(function(r) {
        if (!r.ok) { var e = new Error(r.statusText); e.status = r.status; throw e; }
        return r.json();
    }).then(function(j) {
        self.sha = j.sha;
        try { var d = JSON.parse(decodeURIComponent(escape(atob(j.content)))); if (!d.projects) d.projects = {}; self.data = d; } catch(e) { self.data = { projects: {} }; }
        return self.data;
    });
};
GithubDB.prototype.write = function(data) {
    var self = this;
    if (self._lock) return Promise.resolve();
    self._lock = true;
    return self.read().then(function() {
        var payload = { message: 'Update data [' + new Date().toLocaleString('zh-CN') + ']', content: btoa(unescape(encodeURIComponent(JSON.stringify(data)))), sha: self.sha, branch: self.config.branch };
        return fetch(self.baseUrl, { method: 'PUT', headers: self.headers, body: JSON.stringify(payload) });
    }).then(function(r) {
        if (!r.ok) return r.json().then(function(e) { if (r.status === 409) return self.read().then(function() { payload.sha = self.sha; return fetch(self.baseUrl, { method: 'PUT', headers: self.headers, body: JSON.stringify(payload) }).then(function(r2) { if (!r2.ok) throw new Error('write conflict'); return r2.json(); }); }); throw new Error(e.message || 'write failed'); });
        return r.json();
    }).then(function(r) { self.sha = r.content.sha; self.data = data; }).finally(function() { self._lock = false; });
};
GithubDB.prototype.updateProject = function(id, pd) {
    var self = this;
    return self.read().then(function(d) { d.projects[id] = Object.assign({}, d.projects[id] || {}, pd); return self.write(d); }).then(function() { if (self.onUpdate) self.onUpdate(self.data); });
};
GithubDB.prototype.removeProject = function(id) {
    var self = this;
    return self.read().then(function(d) { delete d.projects[id]; return self.write(d); }).then(function() { if (self.onUpdate) self.onUpdate(self.data); });
};
GithubDB.prototype.batchUpdate = function(updates) {
    var self = this;
    return self.read().then(function(d) { Object.keys(updates).forEach(function(id) { if (updates[id] === null) delete d.projects[id]; else d.projects[id] = Object.assign({}, d.projects[id] || {}, updates[id]); }); return self.write(d); }).then(function() { if (self.onUpdate) self.onUpdate(self.data); });
};
GithubDB.prototype.getCommits = function() {
    return fetch('https://api.github.com/repos/' + this.config.owner + '/' + this.config.repo + '/commits?path=' + this.config.file + '&per_page=50', { headers: this.headers }).then(function(r) { return r.json(); });
};
GithubDB.prototype.readFileAt = function(sha) {
    return fetch('https://api.github.com/repos/' + this.config.owner + '/' + this.config.repo + '/contents/' + this.config.file + '?ref=' + sha, { headers: this.headers }).then(function(r) { return r.json(); });
};
GithubDB.prototype.init = function(onReady) {
    var self = this;
    self.read().then(function() { if (onReady) onReady(true); self.startPoll(); }).catch(function(e) {
        if (e.status === 404) { self.write({ projects: {} }).then(function() { if (onReady) onReady(true); self.startPoll(); }); }
        else { if (onReady) onReady(false, e.message); }
    });
};
GithubDB.prototype.startPoll = function() {
    var self = this;
    if (self.pollTimer) clearInterval(self.pollTimer);
    self.pollTimer = setInterval(function() { self.read().catch(function() {}); }, 15000);
};

function ProjectManager() {
    this.projects = []; this.currentMilestones = []; this.editingId = null;
    this.editingProgressId = null; this.currentProgressProjectId = null;
    this.db = new GithubDB(GITHUB_CONFIG); this.init();
}
ProjectManager.prototype.init = function() {
    var self = this;
    document.getElementById('active-projects').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">正在加载云端数据...</div></div>';
    document.getElementById('connection-status').innerHTML = '<span class="status-dot syncing"></span> 连接中...';
    this.db.init(function(ok, errMsg) {
        if (ok) { self.projects = Object.values(self.db.data.projects); self.updateStatus(true); self.render(); self.tryMigrate(); }
        else { self.updateStatus(false); document.getElementById('active-projects').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">连接失败：' + errMsg + '</div></div>'; }
    });
    this.db.onUpdate = function(data) { self.projects = Object.values(data.projects || {}); self.render(); self.updateStatus(true); };
    this.initImageResize();
    var ps = document.getElementById('project-start'), pe = document.getElementById('project-end');
    if (ps) ps.addEventListener('change', function() { self.validateDates(); });
    if (pe) pe.addEventListener('change', function() { self.validateDates(); });
};
ProjectManager.prototype.tryMigrate = function() {
    var local = localStorage.getItem('pm_projects'); if (!local) return;
    try { var arr = JSON.parse(local); if (!Array.isArray(arr) || !arr.length) return;
        if (confirm('检测到本地有 ' + arr.length + ' 个项目数据。\n\n是否迁移到 GitHub？')) {
            var u = {}; arr.forEach(function(p) { u[p.id] = Object.assign({}, p, { sortOrder: p.sortOrder || p.createdAt || Date.now() }); });
            this.db.data.projects = Object.assign({}, this.db.data.projects, u); this.db.write(this.db.data); localStorage.removeItem('pm_projects'); this.showToast('✅ 数据已迁移！');
        }
    } catch(e) {}
};
ProjectManager.prototype.updateStatus = function(ok) {
    var el = document.getElementById('connection-status'); if (!el) return;
    if (ok) { el.innerHTML = '<span class="status-dot online"></span> 已同步'; el.className = 'connection-status connected'; }
    else { el.innerHTML = '<span class="status-dot offline"></span> 未连接'; el.className = 'connection-status disconnected'; }
};
ProjectManager.prototype.closeModal = function(id) {
    document.getElementById(id).classList.remove('active');
    if (id === 'progress-modal') { this.editingProgressId = null; this.currentProgressProjectId = null; }
    if (id === 'project-modal') this.editingId = null;
};
ProjectManager.prototype.validateDates = function() {
    var s = document.getElementById('project-start').value, e = document.getElementById('project-end').value;
    if (s && e && s > e) { this.showToast('开始时间必须早于结束时间'); document.getElementById('project-end').value = ''; }

ProjectManager.prototype.renderProjectCard = function(p, i, total) {
    var sc = { '未启动': 'status-pending', '进行中': 'status-progress', '已完成': 'status-completed' }[p.status] || 'status-pending';
    return '<div class="project-card"><div class="project-card-layout"><div class="project-main"><div class="project-header"><div><div class="project-title">' + p.name + '</div><div class="project-meta"><span>📅 ' + p.startDate + ' 至 ' + p.endDate + '</span>' + (p.owner ? '<span>👤 ' + p.owner + '</span>' : '') + '</div></div><select class="project-status ' + sc + '" onchange="app.changeStatus(\'' + p.id + '\',this.value)"><option value="未启动"' + (p.status === '未启动' ? ' selected' : '') + '>未启动</option><option value="进行中"' + (p.status === '进行中' ? ' selected' : '') + '>进行中</option><option value="已完成"' + (p.status === '已完成' ? ' selected' : '') + '>已完成</option></select></div>' + (p.description ? '<div class="project-description">' + p.description + '</div>' : '') + '<div class="project-progress-section"><div class="progress-header"><span>📊 项目进度</span><span>' + (p.projectProgress || 0) + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + (p.projectProgress || 0) + '%"></div></div></div><div class="milestones-section"><div class="section-subtitle">里程碑 (' + (p.milestones ? p.milestones.length : 0) + '个)</div>' + this.renderMilestonesGrid(p.milestones) + '</div><div class="project-footer"><div class="project-btns"><button class="btn btn-secondary btn-sm" onclick="app.openProgressModal(\'' + p.id + '\')">📝 记录进展</button><button class="btn btn-secondary btn-sm" onclick="app.viewDetails(\'' + p.id + '\')">👁️ 详情</button><button class="btn btn-secondary btn-sm" onclick="app.openProjectModal(\'' + p.id + '\')">✏️ 编辑</button><button class="btn btn-danger btn-sm" onclick="app.deleteProject(\'' + p.id + '\')">🗑️ 删除</button></div><div class="sort-btns"><button class="btn-sort" onclick="app.moveProject(\'' + p.id + '\',\'up\')"' + (i === 0 ? ' disabled' : '') + '>↑</button><button class="btn-sort" onclick="app.moveProject(\'' + p.id + '\',\'down\')"' + (i === total - 1 ? ' disabled' : '') + '>↓</button><button class="btn btn-secondary btn-sm" onclick="app.archiveProject(\'' + p.id + '\')" style="margin-left:8px">📦 归档</button></div></div></div><div class="project-side"><div class="progress-preview-section"><div class="section-subtitle">最新进展</div>' + this.renderProgressPreview(p) + '</div></div></div></div>';
};
ProjectManager.prototype.renderArchivedCard = function(p) {
    return '<div class="project-card archived" style="padding:20px"><div class="project-header" style="margin-bottom:12px"><div><div class="project-title" style="font-size:16px">' + p.name + '</div><div class="project-meta">' + p.startDate + ' 至 ' + p.endDate + '</div></div><span class="project-status status-archived">已归档</span></div><div style="font-size:12px;color:#8B8680;margin-bottom:12px">进度:' + (p.projectProgress || 0) + '% | 里程碑:' + (p.milestones ? p.milestones.length : 0) + '个 | 进展:' + (p.progressRecords ? p.progressRecords.length : 0) + '条</div><div class="project-footer" style="padding-top:12px"><button class="btn btn-secondary btn-sm" onclick="app.viewDetails(\'' + p.id + '\')">👁️ 查看</button><button class="btn btn-success btn-sm" onclick="app.unarchiveProject(\'' + p.id + '\')">↩️ 恢复</button></div></div>';
};
ProjectManager.prototype.render = function() {
    var ac = document.getElementById('active-projects'), arc = document.getElementById('archived-projects'), filtered = this.getFilteredProjects(), archived = this.projects.filter(function(p) { return p.archived; });
    document.getElementById('empty-active').style.display = filtered.length ? 'none' : 'block';
    document.getElementById('empty-archived').style.display = archived.length ? 'none' : 'block';
    ac.innerHTML = filtered.map(function(p, i) { return app.renderProjectCard(p, i, filtered.length); }).join('');
    arc.innerHTML = archived.map(function(p) { return app.renderArchivedCard(p); }).join('');
};
var app = new ProjectManager();
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(function(m) { m.classList.remove('active'); }); });

</script>
</body>
</html>
